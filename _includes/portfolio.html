
<div id="links" class="portfolio">
	

	{% for post in site.posts %}
    
       <!-- <div class="header">
            <p class="date">{{ post.category }}</p>-->

            <a href="{{ site.url }}/art{{ post.url }}" class="post">

             <div class="flip-box">
  <div class="flip-box-inner">
    <div class="flip-box-front">

      <img src="{{ site.url }}/img/{{ post.img }}" class="img-fluid" alt="Screenshot of {{ post.title }}">
    </div>
    <div class="flip-box-back">
      <p class="title">{{ post.title }}</p>
      <p class="date">{{ post.projectDate }}</p>
      <p class="excerpt" style="text-align:left;">{{ post.excerpt }}</p>
    </div>
  </div>
</div> 

</a>
                    
            

    {% endfor %}
	
</div>
